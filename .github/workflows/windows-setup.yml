name: Build Windows Setup EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-setup:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read app metadata from pubspec
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          $nameMatch = [regex]::Match($pubspec, '(?m)^name:\s*([A-Za-z0-9_\-\.]+)\s*$')
          $versionMatch = [regex]::Match($pubspec, '(?m)^version:\s*([0-9]+\.[0-9]+\.[0-9]+)(?:\+[0-9]+)?\s*$')

          if (-not $nameMatch.Success) {
            throw "Could not read app name from pubspec.yaml"
          }
          if (-not $versionMatch.Success) {
            throw "Could not read semantic version from pubspec.yaml (expected like 1.2.3+4)"
          }

          "APP_NAME=$($nameMatch.Groups[1].Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$($versionMatch.Groups[1].Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows app (release)
        run: flutter build windows --release

      - name: Prepare Inno Setup script
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer -Force | Out-Null
          $template = Get-Content installer/windows_installer.iss.template -Raw
          $script = $template.Replace('__APP_NAME__', $env:APP_NAME).Replace('__APP_VERSION__', $env:APP_VERSION)
          Set-Content -Path installer/windows_installer.generated.iss -Value $script -Encoding utf8

      - name: Build installer (setup.exe)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer/windows_installer.generated.iss

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-setup-${{ env.APP_VERSION }}
          path: installer/output/*.exe
          if-no-files-found: error
