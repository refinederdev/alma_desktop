name: Build Windows Setup EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-setup:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read app metadata from pubspec
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          $nameMatch = [regex]::Match($pubspec, '(?m)^name:\s*([A-Za-z0-9_\-\.]+)\s*$')
          $versionMatch = [regex]::Match($pubspec, '(?m)^version:\s*([0-9]+\.[0-9]+\.[0-9]+)(?:\+[0-9]+)?\s*$')

          if (-not $nameMatch.Success) {
            throw "Could not read app name from pubspec.yaml"
          }
          if (-not $versionMatch.Success) {
            throw "Could not read semantic version from pubspec.yaml (expected like 1.2.3+4)"
          }

          "APP_NAME=$($nameMatch.Groups[1].Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$($versionMatch.Groups[1].Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows app (release)
        run: flutter build windows --release

      - name: Build setup.exe (Inno Setup, absolute paths + ISCC)
        shell: pwsh
        run: |
          $rootWin = ($env:GITHUB_WORKSPACE.TrimEnd('/', '\')) -replace '/', '\'
          $releaseDir = Join-Path $rootWin 'build\windows\x64\runner\Release'
          if (-not (Test-Path $releaseDir)) {
            Write-Host "::error::Flutter Windows Release folder missing: $releaseDir"
            exit 1
          }
          $exes = Get-ChildItem -Path $releaseDir -Filter '*.exe' -ErrorAction SilentlyContinue
          if (-not $exes) {
            Write-Host "::error::No .exe under: $releaseDir"
            exit 1
          }

          New-Item -ItemType Directory -Path (Join-Path $rootWin 'installer') -Force | Out-Null
          $templatePath = Join-Path $rootWin 'installer\windows_installer.iss.template'
          if (-not (Test-Path $templatePath)) {
            Write-Host "::error::Missing installer template: $templatePath"
            exit 1
          }

          $template = Get-Content -LiteralPath $templatePath -Raw
          $script = $template.Replace('__APP_NAME__', $env:APP_NAME).Replace('__APP_VERSION__', $env:APP_VERSION).Replace('__REPO_ROOT__', $rootWin)

          $issPath = Join-Path $rootWin 'windows_installer.generated.iss'
          Set-Content -LiteralPath $issPath -Value $script -Encoding utf8

          Write-Host '--- windows_installer.generated.iss (first 40 lines) ---'
          Get-Content -LiteralPath $issPath | Select-Object -First 40

          $isccCandidates = @(
            (Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) 'Inno Setup 6\ISCC.exe'),
            (Join-Path ([Environment]::GetFolderPath('ProgramFiles')) 'Inno Setup 6\ISCC.exe')
          )
          $iscc = $isccCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Host 'Inno Setup not found on image; installing via Chocolatey...'
            choco install innosetup -y --no-progress
            $iscc = $isccCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          }
          if (-not $iscc) {
            Write-Host '::error::Inno Setup ISCC.exe still not found after install attempt.'
            exit 1
          }

          Write-Host "Using ISCC: $iscc"
          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::ISCC failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-setup-${{ env.APP_VERSION }}
          path: installer/output/*.exe
          if-no-files-found: error
